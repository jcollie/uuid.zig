when:
  - event:
      - push
    branch:
      - main
  - event:
      - manual

engine: nixery

dependencies:
  nixpkgs:
    - openssh

environment:
  TERM: "dumb"
  NO_COLOR: "true"

steps:
  - name: Fix root user
    command: echo "root:x:0:0:root:/tangled/home:/bin/sh" >> /etc/passwd

  - name: Configure SSH & Git
    command: |
      mkdir /tangled/home/.ssh
      chmod 0700 /tangled/home/.ssh
      echo "$GITHUB_DEPLOY_KEY" > /tangled/home/.ssh/github_deploy_key
      chmod 0600 /tangled/home/.ssh/github_deploy_key
      echo "$GITHUB_KNOWN_HOSTS" >> /tangled/home/.ssh/known_hosts
      chmod 0600 /tangled/home/.ssh/known_hosts
      cat > /tangled/home/.ssh/config <<EOF
      Host github.com
        IdentitiesOnly yes
        IdentityFile /tangled/home/.ssh/github_deploy_key
      EOF
      chmod 0600 /tangled/home/.ssh/config

  - name: Push to GitHub
    command: |
      git fetch --unshallow origin main
      git remote add github git@github.com:jcollie/uuid.zig.git
      git push github origin/main:main
