when:
  - event:
      - push
    branch:
      - main
  - event:
      - manual

engine: nixery

dependencies:
  nixpkgs:
    - openssh

environment:
  TERM: "dumb"
  NO_COLOR: "true"

steps:
  - name: Fix root user
    command: echo "root:x:0:0:root:/tangled/home:/bin/sh" >> /etc/passwd

  - name: Configure SSH & Git
    command: |
      echo $HOME
      pwd
      mkdir /tangled/home/.ssh
      chmod 0700 /tangled/home/.ssh
      echo "$GITHUB_DEPLOY_KEY" > /tangled/home/.ssh/github_deploy_key
      chmod 0600 /tangled/home/.ssh/github_deploy_key
      ls -l /tangled/home/.ssh/github_deploy_key
      ssh-keygen -l -E sha256 -f /tangled/home/.ssh/github_deploy_key
      echo "$GITHUB_KNOWN_HOSTS" >> /tangled/home/.ssh/known_hosts
      chmod 0600 /tangled/home/.ssh/known_hosts
      echo > /tangled/home/.ssh/config << EOF
      Host *
        LogLevel DEBUG
        IdentitiesOnly yes
        IdentityFile /tangled/home/.ssh/github_deploy_key
      EOF
      chmod 0600 /tangled/home/.ssh/config
      cat /tangled/home/.ssh/config
      git config --global core.sshCommand "ssh -v"

  - name: Push to GitHub
    command: |
      git fetch --depth=1 origin main
      git remote add github git@github.com:jcollie/uuid.zig.git
      git push --force github origin/main:main
