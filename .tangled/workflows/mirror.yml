when:
  - event:
      - push
    branch:
      - main
  - event:
      - manual

engine: nixery

dependencies:
  nixpkgs:
    - openssh

environment:
  TERM: "dumb"
  NO_COLOR: "true"

steps:
  - name: Fix root user
    command: echo "root:x:0:0:root:/root:/bin/sh" >> /etc/passwd

  - name: Configure SSH
    command: |
      mkdir ~/.ssh
      chmod 0700 ~/.ssh
      echo "$GITHUB_DEPLOY_KEY" > ~/.ssh/github_deploy_key
      chmod 0600 ~/.ssh/github_deploy_key
      echo "$GITHUB_KNOWN_HOSTS" > ~/.ssh/github_known_hosts
      chmod 0600 ~/.ssh/github_known_hosts
      echo > ~/.ssh/config << EOF
      Host github.com
        LogLevel DEBUG
        IdentityFile ~/.ssh/github_deploy_key
        UserKnownHostsFile ~/.ssh/github_known_hosts
      EOF

  - name: Push to GitHub
    command: |
      git fetch --depth=1 origin main
      git remote add github git@github.com:jcollie/uuid.zig.git
      git push github origin/main:main
