when:
  - event:
      - push
    branch:
      - main
  - event:
      - manual

engine: nixery

dependencies:
  nixpkgs:
    - curl
    - glibc

  github:NixOS/nixpkgs/nixpkgs-unstable:
    - zig_0_16

environment:
  TERM: dumb
  NO_COLOR: "true"

steps:
  - name: Check formatting
    command: zig fmt --check .

  - name: Run tests
    command: zig build test

  - name: Build API docs
    command: zig build docs

  - name: Deploy API docs to Wisp
    command: |
      curl -s -o ./wispcli https://sites.wisp.place/nekomimi.pet/wisp-cli-binaries/wisp-cli-x86_64-linux
      chmod a+x ./wispcli
      ./wispcli \
        "$WISP_HANDLE" \
        --path ./zig-out/docs \
        --site "$WISP_SITE" \
        --password "$WISP_APP_PASSWORD"
